services:
  mysql:
    image: mysql:8.4
    container_name: commerce-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
    volumes:
      - commerce_mysql_prod:/var/lib/mysql
      - ./docker/my_sql/init:/docker-entrypoint-initdb.d
    networks:
      - commerce-prod-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7
    container_name: commerce-redis-prod
    restart: unless-stopped
    volumes:
      - commerce_redis_prod:/data
    networks:
      - commerce-prod-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  identity-service:
    image: ghcr.io/logical-coder/identity-service:latest
    container_name: identity-service-prod
    restart: unless-stopped
    env_file:
      - ./identity-service/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_RATE_LIMIT: ${USER_RATE_LIMIT:-50/min}
    command: >
      sh -c "
      sh scripts/wait_for_db.sh &&
      python manage.py migrate &&
      gunicorn identity_service.wsgi:application --bind 0.0.0.0:8000 --workers 1
      "
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commerce-prod-network

  product-service:
    image: ghcr.io/logical-coder/product-service:latest
    container_name: product-service-prod
    restart: unless-stopped
    env_file:
      - ./product-service/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      USER_RATE_LIMIT: ${USER_RATE_LIMIT:-50/min}
    command: >
      sh -c "
      sh scripts/wait_for_db.sh &&
      python manage.py migrate &&
      gunicorn product_service.wsgi:application --bind 0.0.0.0:8000 --workers 1
      "
    ports:
      - "8002:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commerce-prod-network

  gateway-service:
    image: ghcr.io/logical-coder/gateway-service:latest
    container_name: gateway-service-prod
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      DEBUG: "False"
      IDENTITY_SERVICE_URL: http://identity-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      USER_RATE_LIMIT: ${USER_RATE_LIMIT:-50/min}
    command: gunicorn gateway_service.wsgi:application --bind 0.0.0.0:8000 --workers 1
    ports:
      - "8080:8000"
    depends_on:
      - identity-service
      - product-service
    networks:
      - commerce-prod-network

volumes:
  commerce_mysql_prod:
  commerce_redis_prod:

networks:
  commerce-prod-network:
    driver: bridge
