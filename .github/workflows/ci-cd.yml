name: Django CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test-and-quality:
    name: Tests, Coverage, Lint, Format
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: commerce_identity_db
        ports:
          - 3306:3306

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      ENVIRONMENT: local
      DEBUG: "False"
      SECRET_KEY: github-actions-secret-key
      ALLOWED_HOSTS: 127.0.0.1,localhost

      DB_NAME: commerce_identity_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: 127.0.0.1
      DB_PORT: 3306

      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: identity-service
        run: |
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -prootpassword --silent; do
            sleep 2
          done

      - name: Run migrations
        working-directory: identity-service
        run: python manage.py migrate

      - name: Run tests
        working-directory: identity-service
        run: |
          coverage run manage.py test apps/accounts/tests
          coverage report -m

      - name: Lint
        working-directory: identity-service
        run: flake8 .

      - name: Format check
        working-directory: identity-service
        run: black --check .

  docker-build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test-and-quality
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase owner
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: ./identity-service
          file: ./identity-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/identity-service:latest

  deploy:
    name: Deploy (Pull from GHCR)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/commerce-platform/identity-service

            echo "Pull latest image from GHCR"
            docker pull ghcr.io/${{ github.repository_owner }}/identity-service:latest

            echo "Restart containers"
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d

            docker ps