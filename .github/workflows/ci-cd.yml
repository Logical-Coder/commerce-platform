name: Django CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test-identity:
    name: Test Identity Service
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: commerce_identity_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      ENVIRONMENT: local
      DEBUG: "False"
      SECRET_KEY: github-actions-secret-key
      ALLOWED_HOSTS: 127.0.0.1,localhost
      DB_NAME: commerce_identity_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_SECRET_KEY: commerce-super-secret-jwt-key-please-make-it-long
      JWT_ALGORITHM: HS256

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config mysql-client

      - name: Install dependencies
        working-directory: identity-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -prootpassword --silent; do
            sleep 2
          done

      - name: Run migrations
        working-directory: identity-service
        run: python manage.py migrate

      - name: Run tests with coverage
        working-directory: identity-service
        run: |
          coverage run manage.py test apps/accounts/tests
          coverage report -m
          coverage xml

      - name: Run flake8
        working-directory: identity-service
        run: flake8 .

      - name: Check Black formatting
        working-directory: identity-service
        run: black --check .

      - name: Upload identity coverage
        uses: actions/upload-artifact@v4
        with:
          name: identity-coverage-report
          path: identity-service/coverage.xml

  test-product:
    name: Test Product Service
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: commerce_product_db
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6380:6379

    env:
      ENVIRONMENT: local
      DEBUG: "False"
      SECRET_KEY: github-actions-product-secret
      ALLOWED_HOSTS: 127.0.0.1,localhost
      DB_NAME: commerce_product_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_HOST: 127.0.0.1
      DB_PORT: 3307
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6380
      JWT_SECRET_KEY: commerce-super-secret-jwt-key-please-make-it-long
      JWT_ALGORITHM: HS256

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config mysql-client

      - name: Install dependencies
        working-directory: product-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3307 -prootpassword --silent; do
            sleep 2
          done

      - name: Run migrations
        working-directory: product-service
        run: python manage.py migrate

      - name: Run tests with coverage
        working-directory: product-service
        run: |
          coverage run manage.py test apps/catalog/tests
          coverage report -m
          coverage xml

      - name: Run flake8
        working-directory: product-service
        run: flake8 .

      - name: Check Black formatting
        working-directory: product-service
        run: black --check .

      - name: Upload product coverage
        uses: actions/upload-artifact@v4
        with:
          name: product-coverage-report
          path: product-service/coverage.xml

  docker-build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-identity
      - test-product
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: |
          echo "OWNER_LC=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push identity-service image
        uses: docker/build-push-action@v6
        with:
          context: ./identity-service
          file: ./identity-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/identity-service:latest

      - name: Build and push product-service image
        uses: docker/build-push-action@v6
        with:
          context: ./product-service
          file: ./product-service/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/product-service:latest

  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: docker-build
    environment: dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy dev using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/commerce-platform
            git fetch origin main
            git reset --hard origin/main

            docker-compose -f docker-compose.dev.yml down
            docker-compose -f docker-compose.dev.yml up -d --build db redis

            until docker exec commerce-mysql-dev mysqladmin ping -u root -prootpassword --silent; do
              sleep 2
            done

            docker exec commerce-mysql-dev mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_identity_db;"
            docker exec commerce-mysql-dev mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_product_db;"

            docker-compose -f docker-compose.dev.yml up -d --build identity-service product-service

            docker ps

  deploy-staging:
    name: Deploy to STAGING
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy staging using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/commerce-platform
            git fetch origin main
            git reset --hard origin/main

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            echo "Stopping dev"
            docker-compose -f docker-compose.dev.yml down

            docker-compose -f docker-compose.staging.yml pull
            docker-compose -f docker-compose.staging.yml down
            docker-compose -f docker-compose.staging.yml up -d mysql redis

            until docker exec commerce-mysql-staging mysqladmin ping -u root -prootpassword --silent; do
              sleep 2
            done

            docker exec commerce-mysql-staging mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_identity_db;"
            docker exec commerce-mysql-staging mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_product_db;"

            docker-compose -f docker-compose.staging.yml up -d identity-service product-service

            docker ps

  deploy-production:
    name: Deploy to PRODUCTION
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy production using SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/commerce-platform
            git fetch origin main
            git reset --hard origin/main

            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}

            echo "Stopping staging"
            docker-compose -f docker-compose.staging.yml down

            echo "Starting production"
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d mysql redis

            until docker exec commerce-mysql-prod mysqladmin ping -u root -prootpassword --silent; do
              sleep 2
            done

            docker exec commerce-mysql-prod mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_identity_db;"
            docker exec commerce-mysql-prod mysql -u root -prootpassword -e "CREATE DATABASE IF NOT EXISTS commerce_product_db;"

            docker-compose -f docker-compose.prod.yml up -d identity-service product-service

            docker ps
