version: "3.9"

# This file can be used locally to test the same unified architecture
# as the production setup before deploying to AWS EC2
#
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  # Single MySQL container for both services
  db:
    image: mysql:8.4
    container_name: commerce-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: commerce_identity_db
      TZ: "UTC"
    ports:
      - "3307:3306"
    volumes:
      - commerce_mysql_data_dev:/var/lib/mysql
      - ./docker/my_sql/init:/docker-entrypoint-initdb.d
    networks:
      - commerce-dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Single Redis container for both services
  redis:
    image: redis:7-alpine
    container_name: commerce-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - commerce_redis_data_dev:/data
    networks:
      - commerce-dev-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Identity Service - Development
  identity-service:
    image: ghcr.io/logical-coder/identity-service:latest
    build:
      context: ./identity-service
      dockerfile: Dockerfile
    container_name: identity-service-dev
    restart: unless-stopped
    command: >
      sh -c "
      sh scripts/wait_for_db.sh &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    environment:
      ENVIRONMENT: docker
      DEBUG: "True"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: commerce_identity_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1
      USER_RATE_LIMIT: 50/min
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./identity-service:/app
    networks:
      - commerce-dev-network

  # Product Service - Development
  product-service:
    image: ghcr.io/logical-coder/product-service:latest
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service-dev
    restart: unless-stopped
    command: >
      sh -c "
      sh scripts/wait_for_db.sh &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    environment:
      ENVIRONMENT: docker
      DEBUG: "True"
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: commerce_product_db
      DB_USER: root
      DB_PASSWORD: rootpassword
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_HOSTS: localhost,127.0.0.1
      USER_RATE_LIMIT: 50/min
    ports:
      - "8002:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./product-service:/app
    networks:
      - commerce-dev-network

  # API Gateway - Development
  gateway-service:
    image: ghcr.io/logical-coder/gateway-service:latest
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service-dev
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      ENVIRONMENT: docker
      DEBUG: "True"
      IDENTITY_SERVICE_URL: http://identity-service:8000
      PRODUCT_SERVICE_URL: http://product-service:8000
      ALLOWED_HOSTS: localhost,127.0.0.1
      USER_RATE_LIMIT: 50/min
    ports:
      - "8080:8000"
    depends_on:
      - identity-service
      - product-service
    volumes:
      - ./gateway-service:/app
    networks:
      - commerce-dev-network

volumes:
  commerce_mysql_data_dev:
    driver: local
  commerce_redis_data_dev:
    driver: local

networks:
  commerce-dev-network:
    driver: bridge
